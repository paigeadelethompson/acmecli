# ACME Server Configuration
# Location: /etc/acmecli/acmed.conf

# Server configuration
server_url = http://localhost:8080
server_key = /etc/ssl/acme_server.key
server_cert = /etc/ssl/acme_server.crt

# CA configuration
ca_key = /etc/ssl/acme_ca.key
ca_cert = /etc/ssl/acme_ca.crt

# Policy configuration
policy_file = /etc/acmecli/policy.json

# Kerberos configuration
kdc_principal = acme/acme-server@REALM
kdc_keytab = /etc/acmecli/acme-server.keytab

# Server settings
max_connections = 100
request_timeout = 30
rate_limit = 1000